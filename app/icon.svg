    <line x1="64" y1="76" x2="82" y2="76"/><line x1="82" y1="76" x2="97" y2="76"/>
    <!-- T vertical -->
    <line x1="82" y1="76" x2="82" y2="92"/><line x1="82" y1="92" x2="82" y2="109"/><line x1="82" y1="109" x2="82" y2="125"/><line x1="82" y1="125" x2="82" y2="141"/>
    <!-- W -->
    <line x1="97" y1="76" x2="109" y2="117"/><line x1="109" y1="117" x2="121" y2="93"/><line x1="121" y1="93" x2="133" y2="117"/><line x1="133" y1="117" x2="147" y2="76"/>
  </g>
  <!-- network nodes -->
  <g fill="#4abb86">
    <circle cx="100" cy="15" r="4.8"/><circle cx="137" cy="22" r="4.8"/><circle cx="160" cy="44" r="4.8"/><circle cx="170" cy="72" r="4.8"/><circle cx="165" cy="106" r="4.8"/><circle cx="150" cy="138" r="4.8"/><circle cx="130" cy="163" r="4.8"/><circle cx="100" cy="173" r="4.8"/><circle cx="70" cy="163" r="4.8"/><circle cx="50" cy="138" r="4.8"/><circle cx="35" cy="106" r="4.8"/><circle cx="30" cy="72" r="4.8"/><circle cx="40" cy="44" r="4.8"/><circle cx="63" cy="22" r="4.8"/>
    <circle cx="79" cy="41" r="4.8"/><circle cx="121" cy="41" r="4.8"/><circle cx="150" cy="80" r="4.8"/><circle cx="150" cy="124" r="4.8"/><circle cx="121" cy="157" r="4.8"/><circle cx="79" cy="157" r="4.8"/><circle cx="50" cy="124" r="4.8"/><circle cx="50" cy="80" r="4.8"/>
  </g>
  <!-- TW nodes (golden) -->
  <g fill="#ffaa18" filter="url(#glow)">
    <circle cx="64" cy="76" r="5.2"/><circle cx="82" cy="76" r="5.2"/><circle cx="97" cy="76" r="5.2"/><circle cx="82" cy="92" r="5.2"/><circle cx="82" cy="109" r="5.2"/><circle cx="82" cy="125" r="5.2"/><circle cx="82" cy="141" r="5.2"/><circle cx="109" cy="117" r="5.2"/><circle cx="121" cy="93" r="5.2"/><circle cx="133" cy="117" r="5.2"/><circle cx="147" cy="76" r="5.2"/>
  </g>
</svg>
