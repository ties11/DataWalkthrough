    <line x1="79" y1="41" x2="100" y2="15"/><line x1="79" y1="41" x2="63" y2="22"/><line x1="79" y1="41" x2="40" y2="44"/>
    <line x1="121" y1="41" x2="100" y2="15"/><line x1="121" y1="41" x2="137" y2="22"/><line x1="121" y1="41" x2="160" y2="44"/>
    <line x1="150" y1="80" x2="160" y2="44"/><line x1="150" y1="80" x2="170" y2="72"/><line x1="150" y1="80" x2="165" y2="106"/>
    <line x1="150" y1="124" x2="165" y2="106"/><line x1="150" y1="124" x2="150" y2="138"/><line x1="150" y1="124" x2="130" y2="163"/>
    <line x1="121" y1="157" x2="130" y2="163"/><line x1="121" y1="157" x2="100" y2="173"/><line x1="121" y1="157" x2="70" y2="163"/>
