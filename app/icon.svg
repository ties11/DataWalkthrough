    <line x1="50" y1="80" x2="30" y2="72"/><line x1="50" y1="80" x2="40" y2="44"/><line x1="50" y1="80" x2="63" y2="22"/>
    <!-- mid to TW -->
    <line x1="79" y1="41" x2="64" y2="76"/><line x1="79" y1="41" x2="82" y2="76"/>
    <line x1="121" y1="41" x2="147" y2="76"/><line x1="121" y1="41" x2="97" y2="76"/>
    <line x1="50" y1="80" x2="64" y2="76"/><line x1="50" y1="80" x2="82" y2="92"/>
    <line x1="150" y1="80" x2="147" y2="76"/><line x1="150" y1="80" x2="121" y2="93"/>
    <line x1="79" y1="157" x2="82" y2="125"/><line x1="79" y1="157" x2="82" y2="141"/>
    <line x1="150" y1="124" x2="133" y2="117"/><line x1="150" y1="124" x2="121" y2="93"/>
    <line x1="50" y1="124" x2="82" y2="141"/><line x1="50" y1="124" x2="82" y2="125"/>
    <line x1="121" y1="157" x2="109" y2="117"/><line x1="121" y1="157" x2="133" y2="117"/>
    <!-- cross-center -->
    <line x1="82" y1="92" x2="97" y2="76"/><line x1="82" y1="109" x2="121" y2="93"/><line x1="82" y1="125" x2="109" y2="117"/>
    <!-- outer to TW direct -->
    <line x1="100" y1="15" x2="82" y2="76"/><line x1="100" y1="15" x2="147" y2="76"/>
    <line x1="63" y1="22" x2="64" y2="76"/><line x1="137" y1="22" x2="147" y2="76"/>
    <line x1="35" y1="106" x2="82" y2="141"/><line x1="100" y1="173" x2="82" y2="141"/>
