    <line x1="100" y1="15" x2="137" y2="22"/><line x1="137" y1="22" x2="160" y2="44"/><line x1="160" y1="44" x2="170" y2="72"/><line x1="170" y1="72" x2="165" y2="106"/><line x1="165" y1="106" x2="150" y2="138"/><line x1="150" y1="138" x2="130" y2="163"/><line x1="130" y1="163" x2="100" y2="173"/><line x1="100" y1="173" x2="70" y2="163"/><line x1="70" y1="163" x2="50" y2="138"/><line x1="50" y1="138" x2="35" y2="106"/><line x1="35" y1="106" x2="30" y2="72"/><line x1="30" y1="72" x2="40" y2="44"/><line x1="40" y1="44" x2="63" y2="22"/><line x1="63" y1="22" x2="100" y2="15"/>
    <!-- skip-2 chords -->
    <line x1="100" y1="15" x2="160" y2="44"/><line x1="137" y1="22" x2="170" y2="72"/><line x1="160" y1="44" x2="165" y2="106"/><line x1="170" y1="72" x2="150" y2="138"/><line x1="165" y1="106" x2="130" y2="163"/><line x1="150" y1="138" x2="100" y2="173"/><line x1="130" y1="163" x2="70" y2="163"/><line x1="100" y1="173" x2="50" y2="138"/><line x1="70" y1="163" x2="35" y2="106"/><line x1="50" y1="138" x2="30" y2="72"/><line x1="35" y1="106" x2="40" y2="44"/><line x1="30" y1="72" x2="63" y2="22"/><line x1="40" y1="44" x2="100" y2="15"/><line x1="63" y1="22" x2="137" y2="22"/>
    <!-- mid-ring -->
    <line x1="79" y1="41" x2="121" y2="41"/><line x1="121" y1="41" x2="150" y2="80"/><line x1="150" y1="80" x2="150" y2="124"/><line x1="150" y1="124" x2="121" y2="157"/><line x1="121" y1="157" x2="79" y2="157"/><line x1="79" y1="157" x2="50" y2="124"/><line x1="50" y1="124" x2="50" y2="80"/><line x1="50" y1="80" x2="79" y2="41"/>
