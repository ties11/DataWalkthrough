<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1c2128"/>
      <stop offset="100%" stop-color="#0d0f12"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="line-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ed2b6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2ed2b6" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Axis lines — very subtle -->
  <line x1="11" y1="53" x2="11" y2="9"  stroke="#252c35" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="11" y1="53" x2="55" y2="53" stroke="#252c35" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Tick marks on axes -->
  <line x1="9" y1="40" x2="11" y2="40" stroke="#252c35" stroke-width="1"/>
  <line x1="9" y1="27" x2="11" y2="27" stroke="#252c35" stroke-width="1"/>
  <line x1="24" y1="53" x2="24" y2="55" stroke="#252c35" stroke-width="1"/>
  <line x1="38" y1="53" x2="38" y2="55" stroke="#252c35" stroke-width="1"/>

  <!-- Trend / regression line -->
  <line x1="11" y1="50" x2="53" y2="14" stroke="url(#line-grad)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Data points — scattered around the trend, with teal glow -->
  <g filter="url(#glow)">
    <!-- bottom-left cluster -->
    <circle cx="15" cy="47" r="2.9" fill="#2ed2b6"/>
    <circle cx="21" cy="44" r="2.9" fill="#2ed2b6" opacity="0.85"/>
    <!-- mid scatter -->
    <circle cx="28" cy="37" r="2.9" fill="#2ed2b6"/>
    <circle cx="33" cy="30" r="2.9" fill="#2ed2b6" opacity="0.9"/>
    <!-- top-right cluster -->
    <circle cx="41" cy="24" r="2.9" fill="#2ed2b6"/>
    <circle cx="49" cy="18" r="2.9" fill="#2ed2b6" opacity="0.85"/>
  </g>
</svg>
